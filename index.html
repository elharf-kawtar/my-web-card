<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte de Profil Interactive | Kawtar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="profileCard">
    <!-- En-tête -->
    <div class="card-header">
      <div class="avatar">👩‍💻</div>
      <h2>Kawtar El Harf</h2>
      <p>Web Developer</p>
    </div>

    <!-- Corps -->
    <div class="card-body">
      <div class="info">
        <h3>📍 Lieu</h3>
        <p>Casablanca, Maroc</p>
      </div>
      <div class="info">
        <h3>💼 Expérience</h3>
        <p>2 ans en développement web</p>
      </div>
      <div class="info">
        <h3>🚀 Passion</h3>
        <p>Créer des sites modernes et interactifs</p>
      </div>

      <!-- Boutons -->
      <div class="buttons">
        <button class="btn btn-primary" id="followBtn">Suivre +</button>
        <button class="btn btn-secondary" id="messageBtn">Envoyer message</button>
      </div>

      <!-- Message caché -->
      <div class="message" id="messageBox">
        ✨ Merci pour votre message ! Je vous répondrai bientôt.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
